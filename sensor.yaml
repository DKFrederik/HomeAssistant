# Sensors
# Weather
- platform: yr
  name: Weather
  forecast: 24
  monitored_conditions:
    - temperature
    - symbol
    - precipitation
    - windSpeed
    - pressure
    - windDirection
    - humidity
    - fog
    - cloudiness
    - lowClouds
    - mediumClouds
    - highClouds
    - dewpointTemperature

- platform: darksky
  api_key: !secret darksky
  name: Weather
  units: si
  forecast: 1
  monitored_conditions:
    - temperature
    - apparent_temperature
    - temperature_min
    - temperature_max
    - humidity
    - precip_probability
    - precip_intensity
    - precip_type
    - wind_speed
    - wind_bearing
    - pressure
    - icon
      
  # MQTT extracting Wavin current temperatur from all the topics   
- platform: mqtt
  name: "LilleWCFordoer"
  state_topic: "heat/floor807D3A790941/0/current"
- platform: mqtt
  name: "BryggersVarme"
  state_topic: "heat/floor807D3A790941/1/current"
- platform: mqtt
  name: "KøkkenVarme"
  state_topic: "heat/floor807D3A790941/2/current"
