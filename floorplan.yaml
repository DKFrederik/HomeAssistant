      name: Demo Floorplan
      image: /local/custom_ui/floorplan/floorplan.svg
      stylesheet: /local/custom_ui/floorplan/floorplan.css
      
      # These options are optional
      # warnings:                  # enable warnings (to find out why things might ot be working correctly)
      # pan_zoom:                  # enable experimental panning / zooming
      # hide_app_toolbar:          # hide the application toolbar (when used as a custom panel)
      date_format: DD-MMM-YYYY   # Date format to use in hover-over text
      
      last_motion_entity: sensor.template_last_motion
      last_motion_class: last-motion

      groups:
      
        - name: PhilipsTV
          entities:
             - media_player.philipstv
          states:
            - state: 'on'
              class: 'tv-on'
            - state: 'off'
              class: 'tv-off'
        
        - name: windowSensor
          entities:
             - binary_sensor.kontor
          states:
            - state: 'on'
              class: 'binary_sensor_windows-open'
            - state: 'off'
              class: 'binary_sensor_windows-closed'
      
        - name: doorSensor
          entities:
             - binary_sensor.fordoren
             - binary_sensor.indgangsdor
             - binary_sensor.terrassedor_forhave
             - binary_sensor.terrassedor_baghave
          states:
            - state: 'on'
              class: 'binary_sensor_doors-open'
            - state: 'off'
              class: 'binary_sensor_doors-closed'             
        
        - name: Light
          entities:
             - light.garage3
             - light.garage4
             - light.stue_1
             - light.stue_2
             - light.kokken_1
             - light.kokken_2
             - light.spisebord
             - light.under_koekkenbordet
             - light.kontor_led
             - light.gang_1
             - light.gang_2
             - light.sovevaerelse
             - light.tristans_vaerelse
             - light.badevaerelse
             ##Legestue 1
             - light.legestue1
             ##Legestue 2
             - light.legestue2
             ##Legestue 3
             - light.legestue3
             # Kontor lys
             - switch.sonoff_1000319a9b
          states:
            - state: 'on'
              class: 'light-on'
            - state: 'off'
              class: 'light-off'
          action:
            domain: homeassistant
            service: toggle
        
        #Switches with on/off
        - name: Switches_on_off
          entities:
             - switch.kaffemaskine
             - switch.kontor
          states:
            - state: 'on'
              class: 'switch-on'
            - state: 'off'
              class: 'switch-off'
          action:
            domain: homeassistant
            service: toggle
        
        #Switches without on/off
        - name: switches
          entities:
             - switch.computer
             #Switch kontor should not be switchable when it's connected to EdgeRouterPoE. 
             #Can be moved to "Switches_on_off" whenever it's not connected to EdgeRouterPoE. 
             - switch.kontor
          states:
            - state: 'on'
              class: 'switch-on'
            - state: 'off'
              class: 'switch-off'
          action:
            domain: homeassistant
            #service: toggle

        #This is just a dummy to make floor plan show
        - name: Binary sensors
          entities:
          # - binary_sensor.fordoren
          - binary_sensor.kitchen
          # - binary_sensor.master_bedroom
          # - binary_sensor.theatre_room
          states:
            - state: 'off'
              class: 'info-background'
            - state: 'on'
              class: 'warning-background'
          state_transitions:
            - name: On to off
              from_state: 'on'
              to_state: 'off'
              duration: 10
      
      
      
      
      
