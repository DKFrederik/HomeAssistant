# Livingroom normal
- name: Livingroom normal
  entities:
    light.stue_1:
      state: on
      brightness: 255
    light.stue_2:
      state: on
      brightness: 255

# Livingroom dim
- name: Livingroom dim
  entities:
    light.stue_1:
      state: on
      brightness: 40
    light.stue_2:
      state: on
      brightness: 40

