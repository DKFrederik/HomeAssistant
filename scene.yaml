# - id: Livingroom normal
- name: Livingroom normal
  entities:
    light.stue_1:
      state: on
      transition: 2
      brightness_pct: 100
    light.stue_2:
      state: on
      transition: 2
      brightness_pct: 100

# - id: Livingroom dim
- name: Livingroom dim
  entities:
    light.stue_1:
      state: on
      transition: 2
      brightness_pct: 30
    light.stue_2:
      state: on
      transition: 2
      brightness_pct: 30

