title: !secret HomeAssistantName

resources:
  - url: /local/js/now-playing-card.js
    type: js
  - url: /local/floorplan/floorplan-card.js?v=1.1.14
    type: module
  - url: /local/vacuum/xiaomi-vacuum-card.js?v=3.0.1
    type: module
  - url: /hacsfiles/state-attribute-element/state-attribute-element.js
    type: module
  - url: /hacsfiles/mini-graph-card/mini-graph-card-bundle.js
    type: module


views:
            
            ################################################################
            #                                                              #
            #                         Default View                         #
            #                                                              #
            ################################################################
  
  - title: Hjem
    cards:

      - type: alarm-panel
        entity: alarm_control_panel.aeblevangen_alarm
        
      - type: custom:xiaomi-vacuum-card
        entity: vacuum.roomba
        vendor: roomba
        image: /local/pictures/vacuum.png

      - type: entity-filter
        id: vaskemaskine
        entities:
          - sensor.vaskemaskine
          - binary_sensor.vaskemaskine_wash_completed
          - binary_sensor.vaskemaskine_error_state
          - sensor.tid_tilbage
          - sensor.oprindelig_tid
          - sensor.hvad_laver_den
        state_filter: 
          - operator: ">="
            value: "0"
        card:
          type: entities
          title: Vaskemaskine
        
       

            ################################################################
            #                                                              #
            #                         Server View                          #
            #                                                              #
            ################################################################

  - icon: mdi:server-network
    type: horizontal-stack
    title: Server oversigt
    columns: 4
    cards:   

      - type: entity-filter
        entities:
          - sensor.external_ip
          - sensor.internal_ip
          - sensor.last_boot
          - sensor.cpu_temp
          - sensor.processor_use
          - sensor.load_1m
          - sensor.load_5m
          - sensor.load_15m
          - sensor.disk_free_home
          - sensor.disk_use_home
          - sensor.disk_use_percent_home
        state_filter: 
          - operator: ">="
            value: "0"
        card:
          type: entities
          title: Server

            ################################################################
            #                                                              #
            #                   Phoscon Raspberry pi 3b+                   #
            #                                                              #
            ################################################################

      - type: entity-filter
        entities:
          - sensor.phoscon_cpu_temperature
          - sensor.phoscon_disk_usage
          - sensor.phoscon_disk_free
          - sensor.phoscon_uptime
        state_filter: 
          - operator: ">="
            value: "0"          
        card:
          type: entities
          title: Raspberry pi 3b+ (Phoscon)

            ################################################################
            #                                                              #
            #                         Printer                              #
            #                                                              #
            ################################################################

      - type: entity-filter
        entities:
          - sensor.brother_printer_status
          - sensor.brother_printer_uptime
          - sensor.brother_printer_black_toner_remaining
          - sensor.brother_printer_cyan_toner_remaining
          - sensor.brother_printer_magenta_toner_remaining
          - sensor.brother_printer_yellow_toner_remaining
          - sensor.brother_printer_belt_unit_remaining_life
          - sensor.brother_printer_color_counter
          - sensor.brother_printer_b_w_counter
          - sensor.brother_printer_fuser_remaining_life
          - sensor.brother_printer_page_counter
          - sensor.brother_printer_pf_kit_1_remaining_life
        state_filter: 
          - operator: ">="
            value: "0"          
        card:
          type: entities
          title: Printer

            ################################################################
            #                                                              #
            #                    Home Assistant Release                    #
            #                                                              #
            ################################################################

      - type: vertical-stack
        cards:

        - type: glance
          title: Home Assistant Release
          entities:

          - entity: sensor.current_version
            name: Current Version

          - entity: sensor.lastest_release
            name: Latest Release

            ################################################################
            #                                                              #
            #                         Travis                               #
            #                                                              #
            ################################################################

      - type: glance
        show_icon: true
        show_name: true
        show_state: true
        entities:
          - entity: sensor.dkfrederik_homeassistant_state
            icon: 'mdi:github-circle'
            name: Travis state
          - entity: sensor.dkfrederik_homeassistant_last_build_state
            icon: 'mdi:github-circle'
            name: Last build state
          - entity: sensor.dkfrederik_homeassistant_last_build_started_at
            icon: 'mdi:timetable'
            name: Last build started at
          - entity: sensor.dkfrederik_homeassistant_last_build_id
            icon: 'mdi:account-card-details'
            name: Last build id
        title: Travis 

            ################################################################
            #                                                              #
            #                         Security                             #
            #                                                              #
            ################################################################

      - type: vertical-stack
        cards:

        - type: glance
          title: Alarm og sikkerhed
          entities:
          
          - entity: binary_sensor.verisure_ethernet_status
            name: Internet status til Alarm

            ################################################################
            #                                                              #
            #                         Battery View                         #
            #                                                              #
            ################################################################

