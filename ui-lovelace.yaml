title: !secret HomeAssistantName
views:
            
            ################################################################
            #                                                              #
            #                         Default View                         #
            #                                                              #
            ################################################################
  
  - title: Hjem
    cards:

      - type: alarm-panel
        entity: alarm_control_panel.aeblevangen_alarm

            ################################################################
            #                                                              #
            #                         Server View                          #
            #                                                              #
            ################################################################

  - icon: mdi:server-network
    title: Server oversigt
    columns: 3
    cards:   

            ################################################################
            #                                                              #
            #                             Last Boot                        #
            #                                                              #
            ################################################################

      - type: glance
        title: Last Boot
        entities:

        - entity: sensor.last_boot
          name: Uptime

            ################################################################
            #                                                              #
            #                             IP's                             #
            #                                                              #
            ################################################################

      - type: glance
        title: External IP
        entities:
        
        - entity: sensor.external_ip
          name: External IP  

        - entity: sensor.internal_ip
          name: Internal IP 
      
            ################################################################
            #                                                              #
            #                             CPU                              #
            #                                                              #
            ################################################################

      - type: glance
        title: Temperature
        entities:
        
        - entity: sensor.cpu_temp
          name: CPU temperature

      - type: glance
        title: CPU load
        entities:

        - entity: sensor.processor_use
          name: Processor usage

        - entity: sensor.load_1m
          name: Load 1 min.

        - entity: sensor.load_5m
          name: Load 5 min.

        - entity: sensor.load_15m
          name: Load 15 min.

            ################################################################
            #                                                              #
            #                             Disk Usage                       #
            #                                                              #
            ################################################################
      
      - type: glance
        title: Disk Usage
        entities:

        - entity: sensor.disk_use_percent_home
          name: Disk Usage

        - entity: sensor.disk_use_home
          name: Disk Usage

        - entity: sensor.disk_free_home
          name: Disk Free

            ################################################################
            #                                                              #
            #                    Home Assistant Release                    #
            #                                                              #
            ################################################################

      - type: glance
        title: Home Assistant Release
        entities:

        - entity: sensor.current_version
          name: Current Version

        - entity: sensor.lastest_release
          name: Latest Release
            ################################################################
            #                                                              #
            #                         Printer                              #
            #                                                              #
            ################################################################

      - type: entity-filter
        entities:
          - sensor.brother_printer_status
          - sensor.brother_printer_uptime
          - sensor.brother_printer_black_toner_remaining
          - sensor.brother_printer_cyan_toner_remaining
          - sensor.brother_printer_magenta_toner_remaining
          - sensor.brother_printer_yellow_toner_remaining
          - sensor.brother_printer_belt_unit_remaining_life
          - sensor.brother_printer_color_counter
          - sensor.brother_printer_b_w_counter
          - sensor.brother_printer_fuser_remaining_life
          - sensor.brother_printer_page_counter
          - sensor.brother_printer_pf_kit_1_remaining_life
        state_filter: 
          - operator: ">="
            value: "0"          
        card:
          type: entities
          title: Printer

            ################################################################
            #                                                              #
            #                         Battery View                         #
            #                                                              #
            ################################################################

  - icon: mdi:battery-80
    title: Batteri oversigt
    cards:

      - type: markdown
        title: Lovelace
        content: >
          Oversigt over batterier i diverse enheder.

      - type: glance
        title: Batteri oversigt
        entities: 

        - entity: sensor.bryggersbatt
          name: Bryggers varme

        - entity: sensor.kokkenbatt
          name: Køkken varme

        - entity: sensor.gangbatt
          name: Gang varme

        - entity: sensor.lillewcbatt
          name: Lille WC varme

        - entity: sensor.storwcbatt
          name: Stor WC varme

        - entity: sensor.tristansbatt
          name: Tristan varme

        - entity: sensor.fjernbetjening_tristan
          name: Tristan remote

        - entity: sensor.fjernbetjening_badevaerelse
          name: Stor WC remote

        - entity: sensor.fjernbetjening_gang
          name: Køkken remote

        - entity: sensor.fjernbetjening_garage_1
          name: Garage remote

        - entity: sensor.fjernbetjening_sovevaerelse
          name: Soveværelse remote

        - entity: sensor.fjernbetjening_kokken_1
          name: Køkken 1 remote

        - entity: sensor.fjernbetjening_kokken_2
          name: Køkken 2 remote

        - entity: sensor.fjernbetjening_legestue_1
          name: Legestue 1 remote

        - entity: sensor.fjernbetjening_legestue_2
          name: Legestue 2 remote

        - entity: sensor.fjernbetjening_stue_1
          name: Stue 1 remote

        - entity: sensor.fjernbetjening_stue_2
          name: Stue 2 remote

        - entity: sensor.tradlos_bevaegelsessensor_badevaerelse
          name: Stor WC sensor

        - entity: sensor.tradlos_bevaegelsessensor_gang
          name: Gang sensor

        - entity: sensor.tradlos_bevaegelsessensor_legestue
          name: Legestue sensor

