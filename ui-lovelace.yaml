          #                        Now Playing                           #
          #                                                              #
          ################################################################

          ### Stue ###
          - type: "custom:now-playing-poster"
            entity: media_player.chromecast_stue 
            style:
              width: 10%
              top: 12%
              left: 48%
              transform: rotate(90deg) rotateX(39deg) 

          #### Legestue ###
          - type: "custom:now-playing-poster"
            entity: media_player.chromecast_legestue
            style:
              width: 8%
              top: 52%
              left: 57%
              transform: rotateX(124deg) rotateY(180deg) 

