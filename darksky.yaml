sensor:
  - platform: darksky
    api_key: !secret darksky
    name: Weather
    units: si
    forecast: 1
    monitored_conditions:
      - temperature
      - apparent_temperature
      - temperature_min
      - temperature_max
      - humidity
      - precip_probability
      - precip_intensity
      - precip_type
      - wind_speed
      - wind_bearing
      - pressure
      - icon