homeassistant:
  # packages: !include_dir_named packages
  whitelist_external_dirs:
    - /tmp
  # Name of the location where Home Assistant is running
  name: !secret HomeAssistantName
  # Location required to calculate the time the sun rises and sets
  latitude: !secret home_latitude
  longitude: !secret home_longitude
  # Impacts weather/sunrise data (altitude above sea level in meters)
  elevation: !secret elevation
  # metric for Metric, imperial for Imperial
  unit_system: metric
  # Pick yours from here: http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  time_zone: !secret time_zone
  # Customization file
  customize: !include customize.yaml
  #Include integrations in packages folder!
  packages: !include_dir_named packages

# Enables configuration UI
config:
#include Gruoups WHAT TO DO WITH IT NOW THAT GROUPS IS NOT SUPPORTED
# group: !include groups.yaml
#include Automations
automation: !include automations.yaml
#include Automations
automation koekken: !include_dir_list automations/koekken
automation julelys: !include_dir_list automations/julelys
automation garage: !include_dir_list automations/garage
automation media: !include_dir_list automations/media
automation kontor: !include_dir_list automations/kontor
automation stue1: !include_dir_list automations/stue1
automation badevaerelse: !include_dir_list automations/badevaerelse
automation sovevaerelse: !include_dir_list automations/sovevaerelse
automation gang: !include_dir_list automations/gang
automation tts: !include_dir_list automations/tts

#include Scripts
script: !include scripts.yaml
#include Scene
scene: !include scene.yaml
#include Cloud
cloud:
#include sensor
sensor: !include sensor.yaml
#include person
person: !include person.yaml

#Lille WC
climate wavinAhc9000_1:
  - platform: mqtt
    name: LilleWCFordoerVarme
    current_temperature_topic: "heat/floor807D3A790941/0/current"
    temperature_command_topic: "heat/floor807D3A790941/0/target_set"
    temperature_state_topic: "heat/floor807D3A790941/0/target"
    mode_command_topic: "heat/floor807D3A790941/0/mode_set"
    mode_state_topic: "heat/floor807D3A790941/0/mode"
    modes:
    - "heat"
    - "off"
    availability_topic: "heat/floor807D3A790941/online"
    payload_available: "True"
    payload_not_available: "False"
    qos: 0

sensor wavinBattery1:
  - platform: mqtt
    state_topic: "heat/floor807D3A790941/0/battery"
    availability_topic: "heat/floor807D3A790941/online"
    payload_available: "True"
    payload_not_available: "False"
    name: LilleWCBatt
    unit_of_measurement: "%"
    device_class: battery
    qos: 0

