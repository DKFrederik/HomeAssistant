#Sonoff
sonoff:
  username: !secret sonoff_username
  password: !secret sonoff_password
  scan_interval: 60 #(optional, lower values than 60 won't work anymore!)
  grace_period: 600 #(optional)
  api_region: 'eu' #(optional)
  entity_prefix: True #(optional)
  debug: False #(optional)

#MQTT 
mqtt:
  discovery: false
  discovery_prefix: homeassistant
  broker: !secret mqqt_ip
  port: !secret mqqt_port
  client_id: home-assistant
  username: !secret mqtt_username
  password: !secret mqtt_password

#Philips Hue
hue:
  bridges:
    - host: !secret hue_ip
      allow_unreachable: true
      allow_hue_groups: true

#Led strips 
light:
  - platform: flux_led
    devices:
      192.168.3.62:
        name: under_koekkenbordet
      # 192.168.3.61:
      #   name: kontor_led

# Verisure setup configuration
verisure:
    username: !secret verisure_username
    password: !secret verisure_password

#Temperature in our house (Tado)
tado:
    username: !secret tado_username
    password: !secret tado_password

#Tracking who is home or out (not on WiFi)
device_tracker:
  - platform: tado
    username: !secret tado_username
    password: !secret tado_password
    home_id: 255063
  - platform: nmap_tracker 
    #Witch devices to track
    hosts:
       #Frederik
       - !secret frederikMobilNmap
       #Trine
       - !secret trineMobilNmap
       #Sophie
       - !secret sophieMobilNmap
    #How many seconds between scans 
    home_interval: 10
    #How long (in seconds) before a device is considered not home. This helps prevent false readings
    consider_home: 180
    #Find and track new devices 
    new_device_defaults:
      track_new_devices: true

#Lille WC
climate wavinAhc9000_1:
  - platform: mqtt
    name: LilleWCFordoerVarme
    current_temperature_topic: "heat/floor807D3A790941/0/current"
    temperature_command_topic: "heat/floor807D3A790941/0/target_set"
    temperature_state_topic: "heat/floor807D3A790941/0/target"
    mode_command_topic: "heat/floor807D3A790941/0/mode_set"
    mode_state_topic: "heat/floor807D3A790941/0/mode"
    modes:
    - "heat"
    - "off"
    availability_topic: "heat/floor807D3A790941/online"
    payload_available: "True"
    payload_not_available: "False"
    qos: 0

sensor wavinBattery1:
  - platform: mqtt
    state_topic: "heat/floor807D3A790941/0/battery"
    availability_topic: "heat/floor807D3A790941/online"
    payload_available: "True"
    payload_not_available: "False"
    name: LilleWCBatt
    unit_of_measurement: "%"
    device_class: battery
    qos: 0

