person.frederik_kristian_pedersen:
  entity_picture: "/local/pictures/profilbilled.png"
person.trine_2:
  entity_picture: "/local/pictures/trine.png"

### sensor added to see floorplan as a crad on states page. (placeholder for the sensor) ###
binary_sensor.floorplan:
  custom_ui_state_card: state-card-floorplan
  config:
    name: Demo Floorplan
    image: /local/custom_ui/floorplan/floorplan.svg
    stylesheet: /local/custom_ui/floorplan/floorplan.css
    date_format: DD-MMM-YYYY
    last_motion_entity: sensor.template_last_motion
    last_motion_class: last-motion
    groups:
    - name: PhilipsTV
      entities:
      - media_player.philipstv
      states:
      - state: 'on'
        class: tv-on
      - state: 'off'
        class: tv-off
    - name: windowSensor
      entities:
      - binary_sensor.kontor
      states:
      - state: 'on'
        class: binary_sensor_windows-open
      - state: 'off'
        class: binary_sensor_windows-closed
    - name: doorSensor
      entities:
      - binary_sensor.fordoren
      - binary_sensor.indgangsdor
      - binary_sensor.terrassedor_forhave
      - binary_sensor.terrassedor_baghave
      states:
      - state: 'on'
        class: binary_sensor_doors-open
      - state: 'off'
        class: binary_sensor_doors-closed
    - name: Light
      entities:
      # Garage
       - light.garage3
       - light.garage4
       # køkken
       - light.under_koekkenbordet
       - light.koekken1
       - light.koekken2
       - light.spisebord
       # Stue
       - light.stue1
       - light.stue2
       #- light.kontor_led
       # Gang
       - light.gang1
       - light.gang2
       # Soveværelse
       - light.sovevaerelse
       # Tristans værelse
       - light.tristan1
       - light.hue_ambiance_candle_1
       # Badeværelse
       - light.badevaerelse_group
       - light.badevaerelse1
       - light.badevaerelse2
       ##Legestue 1
       - light.legestue1
       ##Legestue 2
       - light.legestue2
       ##Legestue 3
       - light.legestue3
       # Kontor lys
       - switch.sonoff_1000319a9b
      states:
      - state: 'on'
        class: light-on
      - state: 'off'
        class: light-off
      action:
        domain: homeassistant
        service: toggle
    - name: kaffemaskine
      entities:
      - switch.kaffemaskine
      states:
      - state: 'on'
        class: switch-on
      - state: 'off'
        class: switch-off
      action:
        domain: homeassistant
        service: toggle
    - name: Binary sensors
      entities:
      - binary_sensor.kitchen
      states:
      - state: 'off'
        class: info-background
      - state: 'on'
        class: warning-background
      state_transitions:
      - name: On to off
        from_state: 'on'
        to_state: 'off'
        duration: 10

