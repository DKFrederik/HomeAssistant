### Nat belysning ###

- alias: under_koekkenbordet On
  trigger:
    platform: sun
    event: sunset
    offset: "-00:30:00"
  action:
    service: light.turn_on
    entity_id: light.under_koekkenbordet

- alias: under_koekkenbordet Off
  trigger:
    platform: sun
    event: sunrise
    offset: "+00:30:00"
  action:
    service: light.turn_off
    entity_id: light.under_koekkenbordet

### Julelys ###

- alias: Julelys tænd
  trigger:
    platform: sun
    event: sunset
    offset: "-00:30:00"
  action:
    service: switch.turn_on
    entity_id: switch.sonoff_1000986a15

- alias: Julelys sluk
  trigger:
    platform: sun
    event: sunrise
    offset: "+00:30:00"
  action:
    service: switch.turn_off
    entity_id: switch.sonoff_1000986a15

### Media ###

- alias: Media player paused/stopped
  trigger:
  - platform: state
    entity_id: media_player.chromecast_ultra
    from: playing
    to: idle
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  action:
    service: scene.turn_on
    entity_id: scene.livingroom_normal

- alias: Media player playing
  trigger:
  - platform: state
    entity_id: media_player.chromecast_ultra
    to: playing
    from: idle
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  action:
    service: scene.turn_on
    entity_id: scene.livingroom_dim

### Garage ###

- alias: Garage tænd
  trigger:
    platform: sun
    event: sunset
    offset: "-00:30:00"
  action:
    service: scene.turn_on
    entity_id: scene.GarageNat

- alias: Garage sluk
  trigger:
    platform: sun
    event: sunrise
    offset: "+00:30:00"
  action:
    service: light.turn_off
    entity_id:
      - light.garage3
      - light.garage4

### Kommode ###

- alias: Kommode tænd aften
  trigger:
    platform: sun
    event: sunset
    offset: "-00:30:00"
  action:
    service: scene.turn_on
    entity_id: scene.KommodeAften

- alias: kommode sluk
  trigger:
    platform: time
    at: "23:30:00"
  action:
    service: light.turn_off
    entity_id:
      - light.kommode_stue1_lys1
      - light.kommode_stue1_lys2

# This recipe will turn brightness up to max, in the driveway, when door is open. 
# But only after sunset and before sunrise
- alias: Garage when opening door
  trigger:
  - platform: state
    entity_id: binary_sensor.indgangsdor
    to: 'on'
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  action:
    service: scene.turn_on
    entity_id: scene.garage_opening_the_door

# This recipe will dim back down, the driveway, when three minute has passed after the door has closed. 
# But only after sunset and before sunrise
- alias: Garage when closing door
  trigger:
  - platform: state
    entity_id: binary_sensor.indgangsdor
    to: 'off'
    for:
      minutes: 3
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon 
  action:
    service: scene.turn_on
    entity_id: scene.garage_when_door_closes

### Badeværelse ###

- alias: BadevaerelseDag
  trigger:
  - platform: state
    entity_id:
    - light.badevaerelse1
    - light.badevaerelse2
    to: 'on'
    from: 'off'
  condition:
  - condition: time
    after: 06:00:01
    before: '18:59:59'
  action:
    service: scene.turn_on
    entity_id: scene.BadevaerelseDag

- alias: BadevaerelseNat
  trigger:
  - platform: state
    entity_id:
    - light.badevaerelse1
    - light.badevaerelse2
    to: 'on'
    from: 'off'
  condition:
  - condition: time
    after: '19:00:00'
    before: 06:00:00
  action:
    service: scene.turn_on
    entity_id: scene.BadevaerelseNat

