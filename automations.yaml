### Gang ###

- alias: Turn on gang light when there is movement at daytime
  trigger:
    platform: state
    entity_id: binary_sensor.gang_sensor_motion
    to: 'on'
  condition:
  - condition: time
    after: 06:00:01
    before: '18:59:59'
  action:
    service: scene.turn_on
    entity_id: scene.GangDag

- alias: Turn on gang light when there is movement at nighttime
  trigger:
    platform: state
    entity_id: binary_sensor.gang_sensor_motion
    to: 'on'
  condition:
  - condition: time
    after: '19:00:00'
    before: 06:00:00
  action:
    service: scene.turn_on
    entity_id: scene.GangNat

- alias: Turn off gang light 1 minutes after last movement
  trigger:
    platform: state
    entity_id: binary_sensor.gang_sensor_motion
    to: 'off'
    for:
      minutes: 1
  action:
    service: light.turn_off
    entity_id:
      - light.gang1
      - light.gang2


### TTS ###

- alias: FordoerAabnerTTS
  trigger:
  - platform: state
    entity_id: binary_sensor.fordoren
    to: 'on'
  action:
  - service: media_player.volume_set
    data_template:
      entity_id:
      - media_player.stuen
      - media_player.googlehome4494
      volume_level: '0.5'
  - service: tts.google_translate_say
    data:
      entity_id:
      - media_player.stuen
      - media_player.googlehome4494
      message: '..... Fordøren er blevet åbnet! '
