- alias: 'under_koekkenbordet On'
  trigger:
    platform: sun
    event: sunset
  action:
    - service: light.turn_on
      data:
        entity_id: light.under_koekkenbordet
        
- alias: 'under_koekkenbordet Off'
  trigger:
    platform: sun
    event: sunrise
  action:
    - service: light.turn_off
      data:
        entity_id: light.under_koekkenbordet
        
- alias: 'Garage On'
  trigger:
    platform: sun
    event: sunset
  action:
    - service: light.turn_on
      data:
        entity_id: 
          - light.garage3
          - light.garage4
        brightness: 100
        
- alias: 'Garage Off'
  trigger:
    platform: sun
    event: sunrise
  action:
    - service: light.turn_off
      data:
        entity_id: 
          - light.garage3
          - light.garage4
        
- alias: "Media player paused/stopped"
  trigger:
    - platform: state
      entity_id: media_player.chromecast_ultra
      from: 'playing'
      to: 'idle'
  condition:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
  action:
      service: scene.turn_on
      entity_id: scene.livingroom_normal

- alias: "Media player playing"
  trigger:
    - platform: state
      entity_id: media_player.chromecast_ultra
      to: 'playing'
      from: 'idle'
  condition:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
  action:
      service: scene.turn_on
      entity_id: scene.livingroom_dim
      
- alias: Update Available Notification
  trigger:
    - platform: state
      entity_id: binary_sensor.updater
      from: 'off'
      to: 'on'
  action:
    - service: notify.notify
      data_template:
        message: "Home Assistant {{ state_attr('binary_sensor.updater', 'newest_version') }} is available."

- alias: "BadevaerelseDag"
  trigger:
    - platform: state
      entity_id: 
        - light.color_temperature_light_1
        - light.badevaerelse_2
      to: 'on'
      from: 'off'
  condition:
    - condition: time
      after: '06:00:01'
      before: '18:59:59'
  action:
      service: scene.turn_on
      entity_id: scene.BadevaerelseDag

- alias: "BadevaerelseNat"
  trigger:
    - platform: state
      entity_id: 
        - light.color_temperature_light_1
        - light.badevaerelse_2
      to: 'on'
      from: 'off'
  condition:
    - condition: time
      after: '19:00:00'
      before: '06:00:00'
  action:
      service: scene.turn_on
      entity_id: scene.BadevaerelseNat

